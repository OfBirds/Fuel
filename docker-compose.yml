version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fuel-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-fuel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fuel-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fuel-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fuel.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - fuel-network

volumes:
  postgres_data:

networks:
  fuel-network:
    driver: bridge
