version: 2
updates:
  # Backend NuGet packages
  - package-ecosystem: nuget
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Frontend npm packages
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions used by the deploy workflow
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
